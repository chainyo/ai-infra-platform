      - clustersecretstores
      - externalsecrets
      - secretstores
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - kyverno.io
    resources:
      - clusterpolicies
      - policies
