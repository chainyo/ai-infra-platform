---
# application.yaml — GitOps-managed Kyverno installation.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    # renovate: datasource=helm depName=kyverno registryUrl=https://kyverno.github.io/kyverno/
    targetRevision: "3.7.1"
    helm:
      releaseName: kyverno
      values: |
        crds:
          install: true

        admissionController:
          replicas: 1
          resources:
            limits:
              memory: 384Mi
            requests:
              cpu: 100m
              memory: 128Mi

        backgroundController:
          enabled: true
          replicas: 1

        cleanupController:
          enabled: false

        reportsController:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
