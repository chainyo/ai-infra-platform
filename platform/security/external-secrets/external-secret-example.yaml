---
# This fixture demonstrates the central store contract. Operators are expected
# to seed `platform-secrets/shared-smoke-test` via Sealed Secrets or another
# private bootstrap path instead of committing plain Secret values to git.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: platform-kubernetes-store-example
  namespace: external-secrets-demo
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: platform-kubernetes-store
  target:
    name: platform-kubernetes-store-example
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: shared-smoke-test
        property: username
    - secretKey: password
      remoteRef:
        key: shared-smoke-test
        property: password
