---
# root-application.yaml — The ArgoCD App of Apps entry point.
#
# Applied ONCE by script/bootstrap-cluster.sh after ArgoCD is installed.
# This Application tells ArgoCD to watch clusters/ai-infra-platform/ and manage everything
# declared there. It is NOT managed by ArgoCD itself (chicken-and-egg).
#
# All subsequent platform resources are declared under clusters/ai-infra-platform/.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/chainyo/ai-infra-platform
    targetRevision: HEAD
    path: clusters/ai-infra-platform
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
