---
# kustomization.yaml — Dev cluster platform module declarations.
#
# This is the source of truth for the dev cluster. ArgoCD watches this directory
# via the root Application (bootstrap/root-application.yaml) and reconciles
# every resource listed here.
#
# Layer 2: ArgoCD self-management only.
# Layer 3 platform modules (networking, observability, storage, AI) are added
# here as part of their own implementation changes.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - argocd.yaml
