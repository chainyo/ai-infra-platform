---
name: infra-drift-check

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: {}

concurrency:
  group: infra-drift-check
  cancel-in-progress: true

permissions:
  contents: read

env:
  TF_DIR: terraform/modules/hetzner-k3s

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_wrapper: false
      - name: Write SSH key
        run: |
          install -m 600 /dev/null /tmp/ci_ssh_key
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ci_ssh_key
      - name: Terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.HZ_OBJECT_STORAGE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HZ_OBJECT_STORAGE_SECRET_KEY }}
        run: terraform -chdir="${TF_DIR}" init
      - name: Terraform plan (production state)
        id: plan
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.HZ_OBJECT_STORAGE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HZ_OBJECT_STORAGE_SECRET_KEY }}
          TF_VAR_cluster_name: ${{ vars.CLUSTER_NAME || 'ai-infra-platform' }}
          TF_VAR_location: ${{ vars.CLUSTER_LOCATION || 'hel1' }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_ssh_private_key_path: /tmp/ci_ssh_key
          TF_VAR_k3s_version: ${{ vars.K3S_VERSION || '' }}
        run: |
          set +e
          terraform -chdir="${TF_DIR}" plan \
            -detailed-exitcode \
            -no-color \
            2>&1 | tee /tmp/infra-drift-plan.txt
          EXIT_CODE="${PIPESTATUS[0]}"
          {
            echo "exit_code=${EXIT_CODE}"
            case "${EXIT_CODE}" in
              0) echo "result=aligned" ;;
              2) echo "result=drift" ;;
              *) echo "result=error" ;;
            esac
          } >> "$GITHUB_OUTPUT"
          set -e
          if [ "${EXIT_CODE}" -eq 1 ]; then
            exit 1
          fi
      - name: Upload plan artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: infra-drift-plan-${{ github.run_id }}
          path: /tmp/infra-drift-plan.txt
          retention-days: 7
      - name: Summarize result
        if: always()
        run: |
          {
            echo "## Terraform Drift Check"
            echo ""
            echo "- Result: \`${{ steps.plan.outputs.result || 'error' }}\`"
            echo "- Exit code: \`${{ steps.plan.outputs.exit_code || '1' }}\`"
            echo ""
            echo "Artifact: \`infra-drift-plan-${{ github.run_id }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Fail on drift
        if: steps.plan.outputs.exit_code == '2'
        run: |
          echo "::error::Terraform drift detected in production state. Run the deploy-production workflow to reconcile Layer 1." >&2
          exit 1
