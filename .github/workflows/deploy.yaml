---
name: deploy-production

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Queue production deploys; never cancel a running deployment.
concurrency:
  group: deploy-production-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      TF_DIR: terraform/modules/hetzner-k3s
      # renovate: datasource=github-releases depName=argoproj/argo-cd
      ARGOCD_VERSION: v3.3.4
      ARGOCD_NAMESPACE: argocd
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changes
        with:
          filters: |
            terraform:
              - 'terraform/**'
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_wrapper: false
      - name: Show deployment mode
        run: |
          if [ "${{ steps.changes.outputs.terraform }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Terraform changes detected or manual run; full Layer 1+Layer 2+ deploy will run."
          else
            echo "No Terraform changes detected; skipping Layer 1 apply and reconciling GitOps only."
          fi
      - name: Write SSH key
        if: steps.changes.outputs.terraform == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          install -m 600 /dev/null /tmp/deploy_ssh_key
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_ssh_key
      - name: Terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.HZ_OBJECT_STORAGE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HZ_OBJECT_STORAGE_SECRET_KEY }}
        run: terraform -chdir="${TF_DIR}" init
      - name: Terraform apply
        if: steps.changes.outputs.terraform == 'true' || github.event_name == 'workflow_dispatch'
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.HZ_OBJECT_STORAGE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HZ_OBJECT_STORAGE_SECRET_KEY }}
          TF_VAR_cluster_name: ${{ vars.CLUSTER_NAME || 'ai-infra-platform' }}
          TF_VAR_location: ${{ vars.CLUSTER_LOCATION || 'hel1' }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_ssh_private_key_path: /tmp/deploy_ssh_key
          TF_VAR_k3s_version: ${{ vars.K3S_VERSION || '' }}
        run: terraform -chdir="${TF_DIR}" apply -auto-approve
      - name: Converge Terraform state
        if: steps.changes.outputs.terraform == 'true' || github.event_name == 'workflow_dispatch'
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.HZ_OBJECT_STORAGE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HZ_OBJECT_STORAGE_SECRET_KEY }}
          TF_VAR_cluster_name: ${{ vars.CLUSTER_NAME || 'ai-infra-platform' }}
          TF_VAR_location: ${{ vars.CLUSTER_LOCATION || 'hel1' }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_ssh_private_key_path: /tmp/deploy_ssh_key
          TF_VAR_k3s_version: ${{ vars.K3S_VERSION || '' }}
        run: |
          set +e
          terraform -chdir="${TF_DIR}" plan -detailed-exitcode -no-color >/tmp/deploy-post-apply-plan.txt
          EXIT_CODE="$?"
          set -e
          case "${EXIT_CODE}" in
            0)
              echo "Terraform state converged after initial apply."
              ;;
            2)
              echo "Terraform still has pending stateful follow-up changes; applying once more to converge."
              terraform -chdir="${TF_DIR}" apply -auto-approve
              ;;
            *)
              echo "::error::Post-apply Terraform convergence plan failed." >&2
              cat /tmp/deploy-post-apply-plan.txt >&2
              exit 1
              ;;
          esac
      - name: Export kubeconfig
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.HZ_OBJECT_STORAGE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HZ_OBJECT_STORAGE_SECRET_KEY }}
        run: |
          terraform -chdir="${TF_DIR}" output -raw kubeconfig > /tmp/kubeconfig
          ENDPOINT=$(grep -o 'server: https://[^ ]*' /tmp/kubeconfig | cut -d' ' -f2 || true)
          [ -n "$ENDPOINT" ] && echo "::add-mask::${ENDPOINT}"
      - name: Upload kubeconfig artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: kubeconfig-${{ github.ref_name }}-${{ github.run_id }}
          path: /tmp/kubeconfig
          retention-days: 1
      - name: Install ArgoCD CLI
        run: |
          curl -sfLo /usr/local/bin/argocd \
            "https://github.com/argoproj/argo-cd/releases/download/${ARGOCD_VERSION}/argocd-linux-amd64"
          chmod +x /usr/local/bin/argocd
      - name: Install kubectl
        run: |
          KUBECTL_VERSION=$(curl -sfL https://dl.k8s.io/release/stable.txt)
          curl -sfLo /usr/local/bin/kubectl \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x /usr/local/bin/kubectl
      - name: Bootstrap cluster
        if: steps.changes.outputs.terraform == 'true' || github.event_name == 'workflow_dispatch'
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: bash script/bootstrap-cluster.sh
      - name: Configure ArgoCD core access
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          kubectl config set-context --current --namespace="${ARGOCD_NAMESPACE}"
          argocd login localhost --core
      - name: Apply root Application
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: kubectl apply -f bootstrap/root-application.yaml
      - name: Sync all ArgoCD Applications
        id: sync
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          mapfile -t APPS < <(argocd app list --core -o name)
          if [ "${#APPS[@]}" -eq 0 ]; then
            echo "::error::No ArgoCD Applications found to sync."
            exit 1
          fi
          for app in "${APPS[@]}"; do
            echo "Syncing ${app}"
            argocd app sync "${app}" --core
            argocd app wait "${app}" --core --sync --health --timeout 300
          done
      - name: Rollback degraded Applications
        if: failure() && steps.sync.outcome == 'failure'
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          echo "Sync failed. Detecting degraded Applications..."
          DEGRADED=$(
            argocd app list \
              --core \
              -o json 2>/dev/null \
            | jq -r '.[] | select(.status.health.status == "Degraded") | .metadata.name'
          )
          if [ -z "$DEGRADED" ]; then
            echo "No degraded Applications detected — sync may have timed out without a health state change."
            exit 1
          fi
          ROLLBACK_FAILED=0
          while IFS= read -r app; do
            echo "Rolling back: $app"
            if ! argocd app rollback "$app" --core; then
              echo "::error::Rollback failed for '$app' — manual recovery required. See docs/runbooks/ci-deploy.md"
              ROLLBACK_FAILED=1
            fi
          done <<< "$DEGRADED"
          exit $ROLLBACK_FAILED
      - name: Verify platform
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: bash script/verify-platform.sh
      - name: Remove kubeconfig
        if: always()
        run: rm -f /tmp/kubeconfig
