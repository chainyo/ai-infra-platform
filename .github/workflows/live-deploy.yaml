---
name: live-deploy

on:
  push:
    branches: [main]

# Queue deploys; never cancel a running sync — out-of-order syncs corrupt state.
concurrency:
  group: live-deploy-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      TF_DIR: terraform/modules/hetzner-k3s
      # renovate: datasource=github-releases depName=argoproj/argo-cd
      ARGOCD_VERSION: v3.3.4
      ARGOCD_NAMESPACE: argocd
      ARGOCD_APPLICATION_CONTROLLER_NAME: argo-cd-argocd-application-controller
      ARGOCD_REPO_SERVER_NAME: argo-cd-argocd-repo-server
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_wrapper: false

      - name: Terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.HZ_OBJECT_STORAGE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HZ_OBJECT_STORAGE_SECRET_KEY }}
        run: terraform -chdir="${TF_DIR}" init

      - name: Export kubeconfig from Terraform state
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.HZ_OBJECT_STORAGE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HZ_OBJECT_STORAGE_SECRET_KEY }}
        run: |
          terraform -chdir="${TF_DIR}" output -raw kubeconfig > /tmp/kubeconfig
          ENDPOINT=$(grep -o 'server: https://[^ ]*' /tmp/kubeconfig | cut -d' ' -f2 || true)
          [ -n "$ENDPOINT" ] && echo "::add-mask::${ENDPOINT}"

      - name: Install ArgoCD CLI
        run: |
          curl -sfLo /usr/local/bin/argocd \
            "https://github.com/argoproj/argo-cd/releases/download/${ARGOCD_VERSION}/argocd-linux-amd64"
          chmod +x /usr/local/bin/argocd

      - name: Install kubectl
        run: |
          KUBECTL_VERSION=$(curl -sfL https://dl.k8s.io/release/stable.txt)
          curl -sfLo /usr/local/bin/kubectl \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x /usr/local/bin/kubectl

      - name: Configure ArgoCD core access
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          kubectl config set-context --current --namespace="${ARGOCD_NAMESPACE}"
          argocd login localhost --core

      - name: Apply root Application
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: kubectl apply -f bootstrap/root-application.yaml

      - name: Sync all ArgoCD Applications
        id: sync
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          mapfile -t APPS < <(
            argocd app list \
              --core \
              -o name
          )

          if [ "${#APPS[@]}" -eq 0 ]; then
            echo "::error::No ArgoCD Applications found to sync."
            exit 1
          fi

          for app in "${APPS[@]}"; do
            echo "Syncing ${app}"
            argocd app sync "${app}" \
              --core
            argocd app wait "${app}" \
              --core \
              --sync \
              --health \
              --timeout 300
          done

      - name: Rollback degraded Applications
        if: failure() && steps.sync.outcome == 'failure'
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          echo "Sync failed. Detecting degraded Applications..."
          DEGRADED=$(
            argocd app list \
              --core \
              -o json 2>/dev/null \
            | jq -r '.[] | select(.status.health.status == "Degraded") | .metadata.name'
          )

          if [ -z "$DEGRADED" ]; then
            echo "No degraded Applications detected — sync may have timed out without a health state change."
            exit 1
          fi

          ROLLBACK_FAILED=0
          while IFS= read -r app; do
            echo "Rolling back: $app"
            if ! argocd app rollback "$app" \
              --core; then
              echo "::error::Rollback failed for '$app' — manual recovery required. See docs/runbooks/ci-live-deploy.md"
              ROLLBACK_FAILED=1
            fi
          done <<< "$DEGRADED"

          exit $ROLLBACK_FAILED

      - name: Remove kubeconfig
        if: always()
        run: rm -f /tmp/kubeconfig
